# Cosmostrix Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Location:
#   $XDG_CONFIG_HOME/cosmostrix/config.toml
#   or ~/.config/cosmostrix/config.toml
#   (system-wide: /etc/cosmostrix/config.toml)
#
# Format:
#   key = value
#   Flat keys — no TOML sections needed for globals.
#   Profile blocks use profile.<name>.<field> = <value> syntax.
#   Invalid values warn cleanly and are ignored.
#
# Precedence (highest wins):
#   built-in defaults
#   < scene defaults (fills unset keys only)
#   < config values (always wins over scene defaults for user-set keys)
#   < config preset
#   < config profile
#   < CLI preset
#   < CLI scene
#   < CLI profile
#   < low-power
#   < explicit CLI flags
#
# Key rule: a value set in config.toml ALWAYS wins over a scene's
# hardcoded default. Scenes only fill keys the user did NOT set.
# This prevents surprises like `speed = 30` in config being silently
# overwritten by a scene's `speed = 8`.
#
# All keys below are commented out. Uncomment the ones you want to
# customize — cosmostrix's built-in defaults (shown for reference)
# will be used for any key left commented. Run `cosmostrix --testconf`
# to validate your config after editing.
#
# See: cosmostrix --help-detail, cosmostrix --list-scenes,
#      cosmostrix --list-presets, cosmostrix --list-profiles

# ── Scene ────────────────────────────────────────────────────────────────────
# Atmospheric template that bundles sensible defaults for color, charset,
# fps, speed, density, glitch, and rain style.
#   monolith  — premium motion, cosmos palette, binary glyphs (default)
#   matrix    — classic green Matrix rain, katakana glyphs
#   signal    — aurora palette, retro glyphs, slow & dense
# Press `x` at runtime to cycle scenes. See: cosmostrix --list-scenes
# scene = monolith

# ── Preset (optional) ────────────────────────────────────────────────────────
# Apply a curated visual preset on top of config values.
# See: cosmostrix --list-presets, cosmostrix --show-preset cinematic
# preset = cinematic

# ── Profile (optional) ───────────────────────────────────────────────────────
# User-defined profile to apply by default.
# See: cosmostrix --list-profiles
# profile = nightcore

# ── Appearance ───────────────────────────────────────────────────────────────
# Color scheme (palette). See: cosmostrix --list-colors
# color = cosmos

# Character set for the rain glyphs. See: cosmostrix --list-charsets
# Custom characters from file (CLI only, overrides charset):
#   cosmostrix --charset-file ~/my-chars.txt
# charset = binary

# Background mode:
#   default-background — follow terminal emulator bg (default; saves ANSI bytes)
#   black              — force solid #000000 behind rain
# color-bg = default-background

# ── Motion ───────────────────────────────────────────────────────────────────
# Target frames-per-second. Adaptive pacing may reduce under load.
# fps = 60

# Rain fall speed (1–100). Higher = faster rain.
# speed = 20

# Rain density (0.01–5.0). Higher = more columns active.
# density = 0.85

# Variable column speeds for organic rain (default: on).
# Each column gets a random speed multiplier (33%–100% of base).
# Despite the name, this is NOT Rust async/await — cosmostrix remains
# single-threaded. "async" = "asynchronous column pacing".
# async-mode = true

# ── Monolith ─────────────────────────────────────────────────────────────────
# Monolith pillar size (only applies when scene=monolith or rain_style=monolith):
#   small  — slim pillars
#   normal — balanced (default)
#   large  — thick pillars
# monolith-size = normal

# ── Behavior ─────────────────────────────────────────────────────────────────
# Glitch intensity preset:
#   none | subtle | default | intense
# Controls glitchpct, glitchms, shortpct, rippct as a group.
# glitch-level = subtle

# Low-power mode: caps fps=30, speed=5, density=0.5 to reduce CPU use.
# low-power = false

# Mouse capture for interactive controls (default: off).
# mouse = false

# Full-width CJK glyph rendering (default: off).
# fullwidth = false

# Auto color drift: cycle color scheme over time (default: off).
# auto-color-drift = false

# ── Advanced Style ───────────────────────────────────────────────────────────
# Bold style: 0=off, 1=random, 2=all
# bold = 1

# Shading mode: 0=random, 1=cinematic (distance-from-head brightness)
# shadingmode = 1

# ── Atmosphere Engine (opt-in only) ──────────────────────────────────────────
# Atmosphere modulates rain parameters over time for cinematic effect.
# Disabled by default — opt-in only.
#
# atmosphere-mode: disabled (default) | controlled-live
# atmosphere-regime: calm | pulse | signal | compression | void | monolith-pressure
# Note: storm is unavailable and will be rejected.
# See: docs/ATMOSPHERE_PRESETS.md
#
# Example: enable pulse atmosphere
# atmosphere-mode = controlled-live
# atmosphere-regime = pulse

# ── Legacy Advanced Keys (kept for compatibility) ────────────────────────────
# Prefer glitch-level for normal use.
# glitchpct = 10
# shortpct = 50
# rippct = 33.33333
# maxdpc = 3

# ── User Profiles ────────────────────────────────────────────────────────────
# Define named configuration blocks and apply with --profile <name>.
# Each profile overrides specific fields. CLI flags always win.
# See: cosmostrix --list-profiles, docs/PROFILE_EXAMPLES.md
#
# Syntax: profile.<name>.<field> = <value>
# Fields: base, preset, color, charset, fps, speed, density,
#         glitch-level, monolith-size, color-bg,
#         atmosphere-mode, atmosphere-regime

# Calm nighttime profile: gentle rain, low density, no glitch.
# Activate with: cosmostrix --profile calm-night
# profile.calm-night.color = ocean
# profile.calm-night.speed = 4
# profile.calm-night.density = 0.6
# profile.calm-night.fps = 30
# profile.calm-night.glitch-level = none

# Hacker mode: fast, dense, katakana, subtle glitch.
# Activate with: cosmostrix --profile hacker-mode
# profile.hacker-mode.color = green
# profile.hacker-mode.charset = katakana
# profile.hacker-mode.speed = 12
# profile.hacker-mode.density = 1.2
# profile.hacker-mode.glitch-level = subtle

# Cinematic variant: cosmos palette, slower speed, subtle glitch.
# Activate with: cosmostrix --profile cinematic
# profile.cinematic.color = cosmos
# profile.cinematic.speed = 6
# profile.cinematic.glitch-level = subtle

# ── Quick Start ──────────────────────────────────────────────────────────────
# cosmostrix                                       # run with defaults
# cosmostrix --scene matrix                        # classic Matrix rain
# cosmostrix --profile hacker-mode                 # fast & dense
# cosmostrix --profile calm-night                  # gentle nighttime
# cosmostrix --testconf                            # validate this config
# cosmostrix --doctor                              # diagnose terminal issues

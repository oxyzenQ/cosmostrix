name: T-800 - CI

'on':
  push:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - 'AUTHORS'
      - 'TRADEMARK.md'
      - 'SUPPORT.md'
      - '.gitignore'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - 'AUTHORS'
      - 'TRADEMARK.md'
      - 'SUPPORT.md'
      - '.gitignore'

permissions:
  contents: read

env:
  # Opt into Node.js 24 for GitHub Actions (Node 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  security:
    name: T-800 - Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit

  msrv:
    name: T-800 - MSRV (Rust 1.81.0)
    runs-on: ubuntu-latest
    needs: security
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Tests (MSRV)
        run: cargo test --all --locked

  build_test:
    name: T-800 - Test + Build (debug)
    runs-on: ubuntu-latest
    needs: [security, msrv]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          components: rustfmt, clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Set cargo build jobs
        shell: bash
        run: |
          set -euo pipefail
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(nproc 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(sysctl -n hw.ncpu 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS=2
          fi
          echo "CARGO_BUILD_JOBS=${JOBS}" >> "$GITHUB_ENV"

      - name: Tests
        run: cargo test --all --locked

      - name: Build (debug)
        run: cargo build --profile dev --locked --jobs "${CARGO_BUILD_JOBS}"

  macos_build:
    name: T-800 - Build (macos native)
    runs-on: ${{ matrix.os }}
    needs: build_test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            profile: pro-macos-aarch64-native
            build: darwin-aarch64-native
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Set cargo build jobs
        shell: bash
        run: |
          set -euo pipefail
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(nproc 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(sysctl -n hw.ncpu 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS=2
          fi
          echo "CARGO_BUILD_JOBS=${JOBS}" >> "$GITHUB_ENV"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        env:
          RUSTFLAGS: "-C target-cpu=native"
          COSMOSTRIX_BUILD: ${{ matrix.build }}
          COSMOSTRIX_PROFILE: ${{ matrix.profile }}
        run: cargo build --profile ${{ matrix.profile }} --locked --target ${{ matrix.target }} --jobs "${CARGO_BUILD_JOBS}"

      - name: Verify build metadata
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/${{ matrix.profile }}/cosmostrix"
          BUILD_ID="${{ matrix.build }}"
          OUT="$(${BIN} -i)"
          echo "${OUT}"
          echo "${OUT}" | grep -E "^  variant: ${BUILD_ID}$" || { echo "::error::Expected variant ${BUILD_ID}"; exit 1; }
          echo "${OUT}" | grep -E "^  dispatch: static optimized build$" || { echo "::error::Expected dispatch: static optimized build"; exit 1; }
          echo "${OUT}" | grep -E "^  lto: fat$" || { echo "::error::Expected lto: fat"; exit 1; }
          echo "${OUT}" | grep -E "^  panic: unwind$" || { echo "::error::Expected panic: unwind"; exit 1; }
          echo "${OUT}" | grep -E "^  strip: yes$" || { echo "::error::Expected strip: yes"; exit 1; }

  android_build:
    name: T-800 - Build (android-aarch64)
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'push'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Set cargo build jobs
        shell: bash
        run: |
          set -euo pipefail
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(nproc 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(sysctl -n hw.ncpu 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS=2
          fi
          echo "CARGO_BUILD_JOBS=${JOBS}" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r26d

      - name: Add Rust target
        run: rustup target add aarch64-linux-android

      - name: Build (android-aarch64)
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          COSMOSTRIX_BUILD: android-aarch64-native
          COSMOSTRIX_PROFILE: pro-android-aarch64
        run: |
          set -euo pipefail
          TARGET="aarch64-linux-android"

          TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          export CC_aarch64_linux_android="${TOOLCHAIN}/bin/aarch64-linux-android21-clang"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${CC_aarch64_linux_android}"

          cargo build --profile pro-android-aarch64 --locked --target "${TARGET}" --jobs "${CARGO_BUILD_JOBS}"

      - name: Verify embedded build metadata
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/aarch64-linux-android/pro-android-aarch64/cosmostrix"
          BUILD_ID="android-aarch64-native"
          echo "Verifying embedded build metadata in binary: ${BUILD_ID}"
          if command -v strings >/dev/null 2>&1; then
            TEXT="$(strings "${BIN}")"
          else
            TEXT="$(grep -aE 'android-aarch64-native|static optimized build|fat|unwind|yes' "${BIN}" || true)"
          fi
          grep -Fq "${BUILD_ID}" <<<"${TEXT}" || { echo "::error::Expected embedded variant ${BUILD_ID}"; exit 1; }
          grep -Fq "static optimized build" <<<"${TEXT}" || { echo "::error::Expected embedded dispatch metadata"; exit 1; }
          grep -Fq "fat" <<<"${TEXT}" || { echo "::error::Expected embedded lto metadata fat"; exit 1; }
          grep -Fq "unwind" <<<"${TEXT}" || { echo "::error::Expected embedded panic metadata unwind"; exit 1; }
          grep -Fq "yes" <<<"${TEXT}" || { echo "::error::Expected embedded strip metadata yes"; exit 1; }

  linux_aarch64_build:
    name: T-800 - Build (linux aarch64)
    runs-on: ubuntu-latest
    needs: build_test
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Set cargo build jobs
        shell: bash
        run: |
          set -euo pipefail
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(nproc 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(sysctl -n hw.ncpu 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS=2
          fi
          echo "CARGO_BUILD_JOBS=${JOBS}" >> "$GITHUB_ENV"

      - name: Install Linux aarch64 linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add Rust target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          COSMOSTRIX_BUILD: linux-aarch64-native
          COSMOSTRIX_PROFILE: pro
        run: cargo build --profile pro --locked --target aarch64-unknown-linux-gnu --jobs "${CARGO_BUILD_JOBS}"

      - name: Verify embedded build metadata
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/aarch64-unknown-linux-gnu/pro/cosmostrix"
          BUILD_ID="linux-aarch64-native"
          echo "Verifying embedded build metadata in binary: ${BUILD_ID}"
          if command -v strings >/dev/null 2>&1; then
            TEXT="$(strings "${BIN}")"
          else
            TEXT="$(grep -aE 'linux-aarch64-native|static optimized build|fat|unwind|yes' "${BIN}" || true)"
          fi
          grep -Fq "${BUILD_ID}" <<<"${TEXT}" || { echo "::error::Expected embedded variant ${BUILD_ID}"; exit 1; }
          grep -Fq "static optimized build" <<<"${TEXT}" || { echo "::error::Expected embedded dispatch metadata"; exit 1; }
          grep -Fq "fat" <<<"${TEXT}" || { echo "::error::Expected embedded lto metadata fat"; exit 1; }
          grep -Fq "unwind" <<<"${TEXT}" || { echo "::error::Expected embedded panic metadata unwind"; exit 1; }
          grep -Fq "yes" <<<"${TEXT}" || { echo "::error::Expected embedded strip metadata yes"; exit 1; }

  windows_aarch64_build:
    name: T-800 - Build (windows aarch64)
    runs-on: windows-latest
    needs: windows_build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Set cargo build jobs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $jobs = $env:NUMBER_OF_PROCESSORS
          if (-not $jobs) { $jobs = 2 }
          "CARGO_BUILD_JOBS=$jobs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Add Rust target
        run: rustup target add aarch64-pc-windows-msvc

      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: amd64_arm64

      - name: Build
        shell: pwsh
        env:
          COSMOSTRIX_BUILD: windows-aarch64-native
          COSMOSTRIX_PROFILE: pro-win-aarch64
        run: cargo build --profile pro-win-aarch64 --locked --target aarch64-pc-windows-msvc --jobs "$env:CARGO_BUILD_JOBS"

      - name: Verify embedded build metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = "target/aarch64-pc-windows-msvc/pro-win-aarch64/cosmostrix.exe"
          $build = "windows-aarch64-native"
          Write-Host "Verifying embedded build metadata in binary: $build"
          $bytes = [System.IO.File]::ReadAllBytes($bin)
          $text = [System.Text.Encoding]::ASCII.GetString($bytes)
          if (-not $text.Contains($build)) {
            throw "Expected embedded build id '$build' in binary"
          }
          foreach ($needle in @("static optimized build", "fat", "unwind", "yes")) {
            if (-not $text.Contains($needle)) {
              throw "Expected embedded metadata '$needle' in binary"
            }
          }

  linux_cpu_variants:
    name: T-800 - Build (linux x86_64 variants)
    runs-on: ubuntu-latest
    needs: build_test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: pro-linux-v1
            rustflags: "-C target-cpu=x86-64"
            build: linux-x86_64-v1
          - profile: pro-linux-v2
            rustflags: "-C target-cpu=x86-64-v2"
            build: linux-x86_64-v2
          - profile: pro-linux-v3
            rustflags: "-C target-cpu=x86-64-v3"
            build: linux-x86_64-v3
          - profile: pro-linux-v4
            rustflags: "-C target-cpu=x86-64-v4"
            build: linux-x86_64-v4
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Set cargo build jobs
        shell: bash
        run: |
          set -euo pipefail
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(nproc 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(sysctl -n hw.ncpu 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS=2
          fi
          echo "CARGO_BUILD_JOBS=${JOBS}" >> "$GITHUB_ENV"

      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          COSMOSTRIX_BUILD: ${{ matrix.build }}
          COSMOSTRIX_PROFILE: ${{ matrix.profile }}
        run: cargo build --profile ${{ matrix.profile }} --locked --target x86_64-unknown-linux-gnu --jobs "${CARGO_BUILD_JOBS}"

      - name: Verify build metadata
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/x86_64-unknown-linux-gnu/${{ matrix.profile }}/cosmostrix"
          BUILD_ID="${{ matrix.build }}"
          case "${BUILD_ID}" in
            linux-x86_64-v1) BASELINE="x86-64-v1"; OPTIMIZATION="x86-64 baseline (SSE/SSE2)"; REQUIRED=""; DENIED="sse4.2 popcnt avx2 bmi2 fma avx512f" ;;
            linux-x86_64-v2) BASELINE="x86-64-v2"; OPTIMIZATION="x86-64-v2 baseline (SSE3/SSSE3/SSE4.1/SSE4.2/POPCNT)"; REQUIRED="sse4.2 popcnt"; DENIED="avx2 bmi2 fma avx512f" ;;
            linux-x86_64-v3) BASELINE="x86-64-v3"; OPTIMIZATION="x86-64-v3 baseline (AVX/AVX2/BMI1/BMI2/FMA)"; REQUIRED="avx2 bmi2 fma"; DENIED="" ;;
            linux-x86_64-v4) BASELINE="x86-64-v4"; OPTIMIZATION="x86-64-v4 baseline (AVX-512)"; REQUIRED="avx512f avx512bw avx512cd avx512dq avx512vl"; DENIED="" ;;
            *) echo "::error::Unknown Linux x86_64 build id ${BUILD_ID}"; exit 1 ;;
          esac

          if [[ "${BUILD_ID}" == *-v4 ]]; then
            echo "Skipping execution for ${BUILD_ID} (may require AVX-512); verifying embedded build metadata in binary"
            if command -v strings >/dev/null 2>&1; then
              TEXT="$(strings "${BIN}")"
            else
              TEXT="$(grep -aE 'linux-x86_64-v4|x86-64-v4|static optimized build|fat|unwind|yes' "${BIN}" || true)"
            fi
            grep -Fq "${BUILD_ID}" <<<"${TEXT}" || { echo "::error::Expected embedded variant ${BUILD_ID}"; exit 1; }
            grep -Fq "${OPTIMIZATION}" <<<"${TEXT}" || { echo "::error::Expected embedded optimization ${OPTIMIZATION}"; exit 1; }
            grep -Fq "static optimized build" <<<"${TEXT}" || { echo "::error::Expected embedded dispatch metadata"; exit 1; }
            grep -Fq "${BASELINE}" <<<"${TEXT}" || { echo "::error::Expected embedded cpu_baseline ${BASELINE}"; exit 1; }
            for feature in ${REQUIRED}; do
              grep -Fq "${feature}" <<<"${TEXT}" || { echo "::error::Expected embedded target feature ${feature}"; exit 1; }
            done
            grep -Fq "fat" <<<"${TEXT}" || { echo "::error::Expected embedded lto metadata fat"; exit 1; }
            grep -Fq "unwind" <<<"${TEXT}" || { echo "::error::Expected embedded panic metadata unwind"; exit 1; }
            grep -Fq "yes" <<<"${TEXT}" || { echo "::error::Expected embedded strip metadata yes"; exit 1; }
          else
            OUT="$(${BIN} -i)"
            echo "${OUT}"
            echo "${OUT}" | grep -E "^  variant: ${BUILD_ID}$" || { echo "::error::Expected variant ${BUILD_ID}"; exit 1; }
            echo "${OUT}" | grep -Fx "  optimization: ${OPTIMIZATION}" || { echo "::error::Expected optimization: ${OPTIMIZATION}"; exit 1; }
            echo "${OUT}" | grep -E "^  dispatch: static optimized build$" || { echo "::error::Expected dispatch: static optimized build"; exit 1; }
            echo "${OUT}" | grep -E "^  cpu_baseline: ${BASELINE}$" || { echo "::error::Expected cpu_baseline: ${BASELINE}"; exit 1; }
            for feature in ${REQUIRED}; do
              echo "${OUT}" | grep -F "  target_features:" | grep -Fq "${feature}" || { echo "::error::Expected target feature ${feature}"; exit 1; }
            done
            for feature in ${DENIED}; do
              if echo "${OUT}" | grep -F "  target_features:" | grep -Fq "${feature}"; then
                echo "::error::Unexpected target feature ${feature} for ${BUILD_ID}"
                exit 1
              fi
            done
            echo "${OUT}" | grep -E "^  lto: fat$" || { echo "::error::Expected lto: fat"; exit 1; }
            echo "${OUT}" | grep -E "^  panic: unwind$" || { echo "::error::Expected panic: unwind"; exit 1; }
            echo "${OUT}" | grep -E "^  strip: yes$" || { echo "::error::Expected strip: yes"; exit 1; }
          fi
          if file "${BIN}" | grep -qiE 'not stripped'; then
            echo "::error::Metadata says strip: yes, but file reports not stripped: ${BIN}"
            exit 1
          fi

  windows_build:
    name: T-800 - Build (windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Set cargo build jobs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $jobs = $env:NUMBER_OF_PROCESSORS
          if (-not $jobs) { $jobs = 2 }
          "CARGO_BUILD_JOBS=$jobs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build (debug)
        shell: pwsh
        run: cargo build --profile dev --locked --jobs "$env:CARGO_BUILD_JOBS"

      - name: Build (release)
        shell: pwsh
        env:
          COSMOSTRIX_BUILD: windows-x86_64
          COSMOSTRIX_PROFILE: pro-win-x86_64
          RUSTFLAGS: "-C target-cpu=x86-64"
        run: cargo build --profile pro-win-x86_64 --locked --target x86_64-pc-windows-msvc --jobs "$env:CARGO_BUILD_JOBS"

      - name: Verify build metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = "target/x86_64-pc-windows-msvc/pro-win-x86_64/cosmostrix.exe"
          $build = "windows-x86_64"
          $outLines = & $bin -i
          $out = ($outLines | ForEach-Object { $_.TrimEnd("`r") }) -join "`n"
          $out
          $pat = "(?m)^  variant: " + [regex]::Escape($build) + "\s*$"
          if ($out -notmatch $pat) {
            throw "Expected variant '$build' in cosmostrix -i output"
          }
          foreach ($pat in @(
            "(?m)^  dispatch: static optimized build\s*$",
            "(?m)^  lto: fat\s*$",
            "(?m)^  panic: unwind\s*$",
            "(?m)^  strip: yes\s*$"
          )) {
            if ($out -notmatch $pat) {
              throw "Expected metadata pattern '$pat' in cosmostrix -i output"
            }
          }

  fmt_clippy:
    name: T-800 - Format + Clippy
    runs-on: ubuntu-latest
    needs: build_test
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          components: rustfmt, clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  deny:
    name: T-800 - Dependency policy (cargo-deny)
    runs-on: ubuntu-latest
    needs: build_test
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny
        run: cargo deny check all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

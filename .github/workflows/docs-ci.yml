name: T-800 - Docs CI

'on':
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE'
      - 'AUTHORS'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
      - 'NOTICE'
      - 'AUTHORS'

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install codespell
        run: sudo apt-get update && sudo apt-get install -y codespell

      - name: Check spelling
        run: codespell **/*.md

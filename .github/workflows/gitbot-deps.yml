# Schedule: Weekly on Saturday 23:00 UTC (Sunday 06:00 WIB)
#
# Strategy:
# - Weekly auto-update minimizes lockfile churn for a stable-phase project
# - Full validation: audit -> deny -> fmt -> build -> test -> clippy
# - No-op detection skips pipeline when nothing changed
# - Direct self-healing commit to the default branch after validation passes
# - Signed-off commits (no GPG signing)
# - Powered by T-800 automation
#
# For daily security audit (non-mutating), see: gitbot-audit.yml

name: "T-800 - Auto Update Dependencies"

'on':
  schedule:
    - cron: "0 23 * * 6"  # Saturday 23:00 UTC (Sunday 06:00 WIB)
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # Opt into Node.js 24 for GitHub Actions (Node 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  auto-update:
    name: "T-800 - Dependency & Workflow Update"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          components: rustfmt, clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Set cargo build jobs
        shell: bash
        run: |
          set -euo pipefail
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(nproc 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(sysctl -n hw.ncpu 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS=2
          fi
          echo "CARGO_BUILD_JOBS=${JOBS}" >> "$GITHUB_ENV"

      # =========================================================================
      # RUST DEPENDENCIES UPDATE
      # =========================================================================
      - name: Check current versions
        run: |
          echo "=============================================================="
          echo "Current Rust dependency versions:"
          echo "=============================================================="
          cargo tree --depth 1 || true
          echo "=============================================================="

      - name: Install audit + deny tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Baseline security audit (pre-update)
        id: pre_audit
        run: |
          echo "Running baseline security audit (pre-update)..."
          if cargo audit; then
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update dependencies
        id: update_deps
        run: |
          echo "Updating Cargo.lock..."
          CARGO_UPDATE_LOG="${RUNNER_TEMP}/cargo-update.log"
          echo "cargo_update_log=${CARGO_UPDATE_LOG}" >> "$GITHUB_ENV"
          cargo update --workspace 2>&1 | tee "${CARGO_UPDATE_LOG}"

          echo ""
          echo "=============================================================="
          echo "Updated dependency tree:"
          echo "=============================================================="
          cargo tree --depth 1 || true
          echo "=============================================================="

      - name: Check if validation is needed
        id: needs_validation
        run: |
          if git diff --quiet Cargo.lock 2>/dev/null; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates -- skipping validation pipeline"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Updates detected -- proceeding with validation"
          fi

      - name: Security audit
        id: post_audit
        if: steps.needs_validation.outputs.needed == 'true'
        run: |
          echo "Running security audit..."
          cargo audit

      - name: Dependency policy (cargo-deny)
        id: deny
        if: steps.needs_validation.outputs.needed == 'true'
        run: |
          echo "Checking dependency policies..."
          cargo deny check all

      - name: Format check
        id: fmt
        if: steps.needs_validation.outputs.needed == 'true'
        run: |
          echo "Checking code formatting..."
          cargo fmt --all -- --check

      - name: Build project
        id: build
        if: steps.needs_validation.outputs.needed == 'true'
        run: |
          echo "Building with updated dependencies..."
          cargo build --profile dev --locked --jobs "${CARGO_BUILD_JOBS}"
          cargo build --profile release --locked --jobs "${CARGO_BUILD_JOBS}"
          RUSTFLAGS="-C target-cpu=x86-64" cargo build --profile pro-linux-v1 --locked --target x86_64-unknown-linux-gnu --jobs "${CARGO_BUILD_JOBS}"

          echo ""
          echo "Build successful with updated deps"

      - name: Run tests
        id: tests
        if: steps.needs_validation.outputs.needed == 'true'
        run: |
          echo "Running test suite..."
          cargo test --all --locked

          echo ""
          echo "All tests passed"

      - name: Quick clippy check
        id: clippy
        if: steps.needs_validation.outputs.needed == 'true'
        run: |
          echo "Running clippy sanity check..."
          cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No updates needed"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Updates detected"
            echo ""
            echo "Changed files:"
            git status --porcelain
            echo ""
            echo "Diff stat:"
            git diff --stat
          fi

      - name: Generate commit message
        id: commit_msg
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          PRE_AUDIT_VULNERABLE="${{ steps.pre_audit.outputs.vulnerable }}"
          SECURITY_UPDATE="false"
          if [ "${PRE_AUDIT_VULNERABLE}" = "true" ]; then
            SECURITY_UPDATE="true"
          fi

          CARGO_UPDATE_LOG="${{ env.cargo_update_log }}"
          UPDATES_COUNT="0"
          if [ -n "${CARGO_UPDATE_LOG}" ] && [ -f "${CARGO_UPDATE_LOG}" ]; then
            UPDATES_COUNT="$(grep -cE '^[[:space:]]*(Updating|Downgrading)[[:space:]]+' "${CARGO_UPDATE_LOG}" || true)"
            if [ -z "${UPDATES_COUNT}" ]; then
              UPDATES_COUNT="0"
            fi
          fi

          BREAKING_UPDATE="false"
          if [ -n "${CARGO_UPDATE_LOG}" ] && [ -f "${CARGO_UPDATE_LOG}" ]; then
            while IFS= read -r line; do
              if [[ "${line}" =~ ^[[:space:]]*(Updating|Downgrading)[[:space:]]+[^[:space:]]+[[:space:]]+v([0-9]+)\.([0-9]+)\.([0-9]+)[[:space:]]+\-\>[[:space:]]+v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
                OLD_MAJOR="${BASH_REMATCH[2]}"
                OLD_MINOR="${BASH_REMATCH[3]}"
                NEW_MAJOR="${BASH_REMATCH[5]}"
                NEW_MINOR="${BASH_REMATCH[6]}"

                if [ "${OLD_MAJOR}" != "${NEW_MAJOR}" ]; then
                  BREAKING_UPDATE="true"
                  break
                fi

                if [ "${OLD_MAJOR}" = "0" ] && [ "${OLD_MINOR}" != "${NEW_MINOR}" ]; then
                  BREAKING_UPDATE="true"
                  break
                fi
              fi
            done < "${CARGO_UPDATE_LOG}"
          fi

          if [ "${SECURITY_UPDATE}" = "true" ]; then
            TITLE="fix(security): T-800 patches vulnerable dependencies"
          elif [ "${BREAKING_UPDATE}" = "true" ]; then
            TITLE="chore(deps)!: T-800 dependency recalibration"
          else
            TITLE="chore(deps): T-800 dependency recalibration"
          fi

          BASELINE_SECURITY_STATUS="clean"
          if [ "${SECURITY_UPDATE}" = "true" ]; then
            BASELINE_SECURITY_STATUS="advisories found"
          fi

          BODY="Automated update by T-800"
          BODY+=$'\n\n'"## Summary"
          BODY+=$'\n'"- Rust dependencies updated via \`cargo update\` (${UPDATES_COUNT} changes)"
          BODY+=$'\n'"- Security baseline (pre-update): ${BASELINE_SECURITY_STATUS}"
          BODY+=$'\n'"- Security audit (post-update): passed"
          BODY+=$'\n'"- Dependency policy (cargo-deny): passed"
          BODY+=$'\n'"- Formatting (cargo fmt): passed"
          BODY+=$'\n'"- Build (dev + release): passed"
          BODY+=$'\n'"- Tests: passed"
          BODY+=$'\n'"- Clippy: passed"

          if [ -n "${CARGO_UPDATE_LOG}" ] && [ -f "${CARGO_UPDATE_LOG}" ]; then
            UPDATES_SECTION=false
            while IFS= read -r line; do
              [ -n "${line}" ] || continue

              if [ "${UPDATES_SECTION}" != "true" ]; then
                BODY="${BODY}"$'\n\n'"## Dependency updates (top 25)"
                UPDATES_SECTION=true
              fi

              BODY="${BODY}"$'\n'"- ${line}"
            done < <((grep -E '^[[:space:]]*(Updating|Downgrading)[[:space:]]+' "${CARGO_UPDATE_LOG}" || true) | head -n 25 | sed -E 's/^[[:space:]]+//')
          fi

          if [ "${SECURITY_UPDATE}" = "true" ]; then
            BODY="${BODY}"$'\n\n'"## Security"$'\n'"- Baseline audit found advisories before the update"
          fi

          if [ "${BREAKING_UPDATE}" = "true" ]; then
            BODY="${BODY}"$'\n\n'"## Breaking change risk"$'\n'"- Detected a major (or 0.x minor) version jump in Cargo.lock"
          fi

          COMMIT_BODY="${BODY}"

          {
            echo "title=$TITLE"
            echo "commit_body<<EOF"
            echo "$COMMIT_BODY"
            echo "EOF"
            echo "commit_message<<EOF"
            echo "$TITLE"
            echo ""
            echo "$COMMIT_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "oxyzenQ"
          git config user.email "130107241+oxyzenQ@users.noreply.github.com"
          git config --local commit.gpgsign false
          git config --local tag.gpgsign false

          git add -A
          git commit --no-gpg-sign -s \
            -m "${{ steps.commit_msg.outputs.title }}" \
            -m "${{ steps.commit_msg.outputs.commit_body }}"

          git push origin main

          echo ""
          echo "Updates pushed to main branch"
          echo "Commit: $(git rev-parse HEAD)"

      - name: Summary
        run: |
          echo "=============================================================="
          echo "T-800 - UPDATE SUMMARY"
          echo "=============================================================="
          echo ""
          echo "Mode: direct commit to main after validation"
          echo ""

          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "Updates Applied:"
            echo "  - Rust dependencies updated"
            echo "  - Security audit passed"
            echo "  - Tests passed"

            echo ""
            echo "Changes pushed to main branch"
            echo "Commit: $(git rev-parse HEAD)"
          else
            echo "No updates needed - everything is current!"
          fi

          echo ""
          echo "=============================================================="
          echo "Next run: Saturday 23:00 UTC (Sunday 06:00 WIB)"
          echo "Daily audit: gitbot-audit.yml"
          echo "Manual trigger: Actions -> Auto Update Dependencies"
          echo "=============================================================="

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

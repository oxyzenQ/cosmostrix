# Schedule: Weekly on Monday 00:00 UTC (Monday 07:00 WIB)
#
# Direct-main dependency updates use a two-phase privilege model:
# - validate: read-only token, dependency update, full checks, lockfile artifact
# - commit: write token, no dependency code execution, Cargo.lock allowlist only

name: Maintenance deps weekly

'on':
  schedule:
    - cron: "0 7 * * 1"  # Monday 00:00 UTC (Monday 07:00 WIB)
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Maintenance deps weekly validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          components: rustfmt, clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Set cargo build jobs
        shell: bash
        run: |
          set -euo pipefail
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)"
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(nproc 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS="$(sysctl -n hw.ncpu 2>/dev/null || true)"
          fi
          if [[ -z "${JOBS}" ]]; then
            JOBS=2
          fi
          echo "CARGO_BUILD_JOBS=${JOBS}" >> "$GITHUB_ENV"

      - name: Install audit + deny tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Baseline security audit
        run: cargo audit

      - name: Update dependencies
        run: cargo update --workspace

      - name: Enforce dependency-only diff
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dependencies are already up to date"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Auto-update may only modify Cargo.lock"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Security audit
        if: steps.changes.outputs.changed == 'true'
        run: cargo audit

      - name: Dependency policy
        if: steps.changes.outputs.changed == 'true'
        run: cargo deny check all

      - name: Format check
        if: steps.changes.outputs.changed == 'true'
        run: cargo fmt --all -- --check

      - name: Build project
        if: steps.changes.outputs.changed == 'true'
        run: |
          cargo build --profile dev --locked --jobs "${CARGO_BUILD_JOBS}"
          cargo build --profile release --locked --jobs "${CARGO_BUILD_JOBS}"
          RUSTFLAGS="-C target-cpu=x86-64" cargo build --profile pro-linux-v1 --locked --target x86_64-unknown-linux-gnu --jobs "${CARGO_BUILD_JOBS}"

      - name: Run tests
        if: steps.changes.outputs.changed == 'true'
        run: cargo test --all --locked

      - name: Clippy
        if: steps.changes.outputs.changed == 'true'
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Upload validated Cargo.lock
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: validated-cargo-lock
          path: Cargo.lock
          if-no-files-found: error

  commit:
    name: Maintenance deps weekly commit
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.changed == 'true'
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download validated Cargo.lock
        uses: actions/download-artifact@v6
        with:
          name: validated-cargo-lock
          path: .auto-update

      - name: Commit dependency update
        shell: bash
        run: |
          set -euo pipefail
          cp .auto-update/Cargo.lock Cargo.lock

          if git diff --quiet; then
            echo "Validated lockfile is already current"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Commit job may only modify Cargo.lock"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore(deps): maintenance deps weekly"
          git push origin HEAD:main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

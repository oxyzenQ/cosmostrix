[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "GPL-3.0-only",
  "GPL-3.0-or-later",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"
unused-license-exception = "allow"
exceptions = []

[licenses.private]
ignore = true
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
# Transitive dependency duplicates that cannot be resolved without upstream
# changes. These are caused by the dependency tree pulling in different
# major versions of the same crate through different paths:
#
# - bitflags 1.3.2 (via inotify → notify) vs 2.13.1 (via crossterm, ctrlc, etc.)
#   notify v6 pulls inotify which still uses bitflags 1.x; cannot force
#   notify to use bitflags 2.x without upstream PR.
#
# - mio 0.8.11 (via notify) vs 1.2.2 (via crossterm, signal-hook-mio)
#   notify v6 depends on mio 0.8 for its event loop; crossterm v0.29 uses
#   mio 1.x. Different major versions — cannot be deduped.
#
# - windows-sys 0.48.0 (via mio 0.8 / notify) vs 0.61.2 (via ctrlc, rustix,
#   anstream, etc.) Same root cause: mio 0.8 pins windows-sys 0.48.
#
# All three are Windows-specific or transitive-only — they don't affect
# the cosmostrix binary on Linux/macOS/FreeBSD at runtime. Skipping them
# here silences the duplicate-versions warning without hiding real issues.
skip = [
    { name = "bitflags", version = "1.3.2" },
    { name = "mio", version = "0.8.11" },
    { name = "windows-sys", version = "0.48.0" },
]
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
